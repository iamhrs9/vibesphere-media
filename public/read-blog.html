<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Base tags (JS updates these dynamically once the article loads) -->
    <title>Blog Article | VibeSphere Media</title>
    <meta name="description" id="meta-desc"
        content="Read expert Digital Marketing, Instagram Growth, and Web Development articles on the VibeSphere Blog. Actionable strategies for entrepreneurs and businesses.">
    <meta name="keywords"
        content="VibeSphere Blog Article, Digital Marketing Tips, Instagram Growth Guide, Social Media Strategy, Web Development Tutorial">
    <meta name="author" content="VibeSphere Media">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (will be updated by JS) -->
    <meta property="og:type" content="article">
    <meta property="og:title" id="og-title" content="Blog | VibeSphere Media">
    <meta property="og:description" id="og-desc"
        content="Expert tips and strategies from VibeSphere Media's growth blog.">
    <meta property="og:url" content="https://vibespheremedia.in/blog">
    <meta property="og:image" content="https://vibespheremedia.in/logo.webp">
    <meta property="og:site_name" content="VibeSphere Media">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VibeSphere Blog">
    <meta name="twitter:description" content="Growth strategies and digital marketing insights.">
    <meta name="twitter:image" content="https://vibespheremedia.in/logo.webp">

    <!-- JSON-LD: BlogPosting schema (base; JS updates the real article name) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "Expert Digital Marketing Article",
      "description": "Expert Digital Marketing, Social Media Growth, and Web Development insights from VibeSphere Media.",
      "author": {
        "@type": "Organization",
        "name": "VibeSphere Media",
        "url": "https://vibespheremedia.in"
      },
      "publisher": {
        "@type": "Organization",
        "name": "VibeSphere Media",
        "logo": { "@type": "ImageObject", "url": "https://vibespheremedia.in/logo.webp" }
      },
      "mainEntityOfPage": "https://vibespheremedia.in/blog"
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden !important;
            margin: 0;
            padding: 0;
            background-color: #ffffff !important;
            color: #1e293b !important;
            font-family: 'Outfit', sans-serif;
        }

        /* --- NAVBAR --- */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 20px;
        }

        .nav-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #8b5cf6;
            gap: 8px;
        }

        /* --- ARTICLE CONTAINER --- */
        .article-container {
            max-width: 800px;
            margin: 40px auto 100px;
            padding: 0 20px;
        }

        /* --- IMAGE --- */
        .featured-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
            line-height: 1.3;
            text-align: center;
        }

        .date {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 40px;
            display: block;
            font-weight: 500;
        }

        /* --- 🔥 CLAUDE STYLE RICH TEXT CONTENT --- */
        .content-body {
            font-family: 'Charter', 'Bitstream Charter', 'Source Serif 4', Georgia, serif;
            font-size: 1.15rem;
            line-height: 1.8;
            color: #1a1a1a;
            /* Claude jaisa dark crisp black */
            letter-spacing: -0.01em;
        }

        .content-body p {
            margin-bottom: 1.5em;
        }

        /* Make sure images inside content fit the screen */
        .content-body img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 20px 0;
        }

        /* Blockquotes styling - Claude Style */
        .content-body blockquote {
            border-left: 3px solid #1a1a1a;
            margin: 20px 0;
            padding-left: 20px;
            font-style: italic;
            color: #475569;
            background: transparent;
        }

        /* Lists */
        .content-body ul,
        .content-body ol {
            padding-left: 25px;
            margin-bottom: 20px;
        }

        .content-body li {
            margin-bottom: 10px;
            padding-left: 5px;
        }

        /* Headings inside content */
        .content-body h2,
        .content-body h3 {
            font-family: 'Outfit', sans-serif;
            /* Headings sans-serif hi achhe lagte hain */
            color: #1e293b;
            margin-top: 40px;
            margin-bottom: 15px;
        }

        /* Loading State */
        .loader {
            text-align: center;
            padding: 50px;
            color: #cbd5e1;
        }

        /* Mobile Fixes */
        @media screen and (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .content-body {
                font-size: 1rem;
            }

            .article-container {
                margin-top: 20px;
            }
        }

        /* --- AUTHOR & SHARE BAR --- */
        .meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .author-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #8b5cf6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .author-details p {
            margin: 0;
            color: #1e293b;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .author-details span {
            color: #64748b;
            font-size: 0.85rem;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .share-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.3s;
            font-size: 1.1rem;
            text-decoration: none;
        }

        .share-btn.wa {
            background: #25D366;
        }

        .share-btn.tw {
            background: #000000;
        }

        .share-btn.in {
            background: #0A66C2;
        }

        .share-btn.cp {
            background: #64748b;
        }

        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>

    <header>
        <div class="nav-inner">
            <a href="/blog.html" class="back-btn"><i class="ri-arrow-left-line"></i> Back to Blog</a>
            <span style="font-weight: 700; color: #1e293b;">VibeSphere<span style="color:#8b5cf6">.</span></span>
        </div>
    </header>

    <div class="article-container">

        <div id="loading" class="loader">
            <i class="ri-loader-4-line ri-spin" style="font-size: 2rem;"></i>
        </div>

        <div id="blogContent" style="display: none;">

            <img id="bImg" class="featured-img" src="" alt="Blog Cover" onerror="this.style.display='none'">

            <h1 id="bTitle">Loading Title...</h1>


            <div class="meta-bar">
                <div class="author-info">
                    <div class="author-avatar">V</div>
                    <div class="author-details">
                        <p>VibeSphere Team</p>
                        <span id="bDate">Loading Date...</span>
                    </div>
                </div>
                <div class="share-buttons">
                    <span style="font-size: 0.85rem; color: #64748b; font-weight: 600;">Share:</span>
                    <a href="#" class="share-btn wa" id="shareWA" target="_blank" title="Share on WhatsApp"><i
                            class="ri-whatsapp-line"></i></a>
                    <a href="#" class="share-btn tw" id="shareTW" target="_blank" title="Share on X"><i
                            class="ri-twitter-x-line"></i></a>
                    <a href="#" class="share-btn in" id="shareIN" target="_blank" title="Share on LinkedIn"><i
                            class="ri-linkedin-fill"></i></a>
                    <button class="share-btn cp" onclick="copyLink()" title="Copy Link"><i
                            class="ri-links-line"></i></button>
                </div>
            </div>

            <div id="bContent" class="content-body"></div>



        </div>
    </div>

    <footer
        style="background: #ffffff; color: #333; padding: 40px 5%; text-align: center; border-top: 1px solid #eaeaea; margin-top: 80px;">
        <div style="margin-bottom: 20px;">
            <h2 style="color: #333; font-weight: 700; margin-bottom: 5px;">VibeSphere Media</h2>
            <p style="color: #666; font-size: 0.9rem;">Growing Brands Digitally.</p>
        </div>
        <div style="display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin-bottom: 25px;">
            <a href="/" style="color: #555; text-decoration: none; font-weight: 500; transition: 0.3s;">Home</a>
            <a href="/blog.html"
                style="color: #555; text-decoration: none; font-weight: 500; transition: 0.3s;">Blog</a>
            <a href="/terms&conditions"
                style="color: #555; text-decoration: none; font-weight: 500; transition: 0.3s;">Terms</a>
            <a href="/refundpolicy"
                style="color: #555; text-decoration: none; font-weight: 500; transition: 0.3s;">Refund Policy</a>
            <a href="/contact"
                style="color: #555; text-decoration: none; font-weight: 500; transition: 0.3s;">Support</a>
        </div>
        <div style="border-top: 1px solid #f0f0f0; padding-top: 20px;">
            <p style="font-size: 0.8rem; color: #888;">&copy; 2026 VibeSphere Media. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const slug = window.location.pathname.split('/').pop();

        fetch(`/api/blog/${slug}`)
            .then(res => res.json())
            .then(blog => {
                document.getElementById('loading').style.display = 'none';

                if (blog.error) {
                    document.querySelector('.article-container').innerHTML = `<h2 style="text-align:center; margin-top:50px; color:#64748b;">Blog not found 😕</h2>`;
                    return;
                }

                document.getElementById('blogContent').style.display = 'block';

                // 1. Set Image
                const imgEl = document.getElementById('bImg');
                if (blog.image) imgEl.src = blog.image;
                else imgEl.style.display = 'none';

                // 2. Set Date
                let dateStr = "Recent";
                try {
                    dateStr = new Date(blog.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                } catch (e) { }
                document.getElementById('bDate').innerText = "Published on " + dateStr;

                // 3. Set Title & SEO Meta Title
                const title = blog.title || blog.titleHinglish || blog.titleHindi || "Untitled Post";
                document.getElementById('bTitle').innerText = title;
                // Agar admin panel se metaTitle daala hai toh wo, warna normal title
                document.title = `${blog.metaTitle || title} | VibeSphere Blog`;

                // 4. Set Content (🔥 WITH DOMPURIFY SECURITY)
                const rawContent = blog.content || blog.contentHinglish || blog.contentHindi || "No content.";
                // Yahan DOMPurify kisi bhi ghalat <script> (XSS attack) ko filter kar dega
                if (typeof DOMPurify !== 'undefined') {
                    document.getElementById('bContent').innerHTML = DOMPurify.sanitize(rawContent);
                } else {
                    document.getElementById('bContent').innerHTML = rawContent;
                }

                // 5. SEO Description update
                const plainText = rawContent.replace(/<[^>]*>?/gm, '');
                let metaDesc = document.querySelector('meta[name="description"]');
                if (!metaDesc) {
                    metaDesc = document.createElement('meta');
                    metaDesc.name = "description";
                    document.head.appendChild(metaDesc);
                }
                // Agar admin panel se metaDesc daala hai toh wo, warna text trim karke daal do
                metaDesc.content = blog.metaDesc || plainText.substring(0, 150) + "...";

                // 6. Set Social Share Links
                const pageUrl = encodeURIComponent(window.location.href);
                const pageTitle = encodeURIComponent(title);

                const waLink = document.getElementById('shareWA');
                const twLink = document.getElementById('shareTW');
                const inLink = document.getElementById('shareIN');

                // Buttons ke andar link set kar rahe hain
                if (waLink) waLink.href = `https://api.whatsapp.com/send?text=${pageTitle}%0A${pageUrl}`;
                if (twLink) twLink.href = `https://twitter.com/intent/tweet?text=${pageTitle}&url=${pageUrl}`;
                if (inLink) inLink.href = `https://www.linkedin.com/sharing/share-offsite/?url=${pageUrl}`;

                // Copy Link function
                window.copyLink = function () {
                    navigator.clipboard.writeText(window.location.href);
                    alert("Link copied to clipboard! 🔗");
                }

            })
            .catch(err => {
                document.getElementById('loading').innerHTML = "Error loading article.";
                console.error("Fetch Error:", err);
            });
    </script>
    <script src="/js/utils/auth.js"></script>
    <script src="/js/utils/global-ui.js"></script>
</body>

</html>
