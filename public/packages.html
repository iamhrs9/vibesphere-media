    <script>
        // ==========================================
        // 🚀 DYNAMIC PACKAGES ENGINE 
        // ==========================================

        let allPackages = [];
        let allServices = [];
        let currentCountryCode = 'IN'; // Default Fallback

        document.addEventListener('DOMContentLoaded', initDynamicPackages);

        async function initDynamicPackages() {
            try {
                // Fetch Services & Packages concurrently
                const [servicesRes, packagesRes] = await Promise.all([
                    fetch('/api/services'),
                    fetch('/api/packages')
                ]);

                const servicesData = await servicesRes.json();
                const packagesData = await packagesRes.json();

                if (servicesData.success) {
                    allServices = servicesData.services;
                    renderFilters(allServices);
                }

                if (packagesData.success) {
                    allPackages = packagesData.packages;
                    currentCountryCode = packagesData.countryCode || 'IN';

                    const curLabel = document.getElementById('currency-label');
                    if (curLabel) {
                        const currencyName = currentCountryCode === 'IN' || currentCountryCode === 'NP' || currentCountryCode === 'BD' || currentCountryCode === 'LK' || currentCountryCode === 'PK' ? 'INR (₹)' : 'USD ($)';
                        curLabel.innerHTML = `<i class="ri-global-line"></i> Pricing Optimized for <b>${currentCountryCode}</b> (${currencyName})`;
                    }

                    renderPackages(allPackages);
                } else {
                    showError("Failed to load packages.");
                }

            } catch (error) {
                console.error("Initialization Error:", error);
                showError("Network error. Please try again later.");
            }
        }

        // ==========================================
        // UI RENDERING
        // ==========================================

        function renderFilters(services) {
            const filterContainer = document.getElementById('category-filters');
            if (!filterContainer) return;

            // Keep "All Packages" button, empty the rest to prevent dupes
            filterContainer.innerHTML = `<button class="filter-btn active" data-id="all">All Packages</button>`;

            services.forEach(service => {
                if (service.isActive) {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.setAttribute('data-id', service._id);
                    btn.textContent = service.title;
                    filterContainer.appendChild(btn);
                }
            });

            // Attach Click Listeners
            filterContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Update Active State
                    filterContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    // Filter Logic
                    const categoryId = e.target.getAttribute('data-id');
                    if (categoryId === 'all') {
                        renderPackages(allPackages);
                    } else {
                        const filtered = allPackages.filter(pkg =>
                            pkg.serviceId && (typeof pkg.serviceId === 'object' ? pkg.serviceId._id === categoryId : pkg.serviceId === categoryId)
                        );
                        renderPackages(filtered);
                    }
                });
            });
        }

        function renderPackages(packagesToRender) {
            const container = document.getElementById('packages-container');
            if (!container) return;

            if (packagesToRender.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                        <i class="ri-box-3-line" style="font-size: 3rem; color: #ccc; margin-bottom: 15px; display: block;"></i>
                        <h3 style="color: #666; font-size: 1.2rem;">No packages available in this category yet.</h3>
                    </div>`;
                return;
            }

            // Map and Generate HTML
            const html = packagesToRender.map(pkg => {
                // Geo-Pricing Resolution
                const priceValue = pkg.geo?.price || 0;
                const currency = pkg.geo?.currency || 'INR';
                const symbol = currency === 'INR' ? '₹' : '$';

                // Features List
                const featuresHtml = (pkg.features && Array.isArray(pkg.features))
                    ? pkg.features.map(f => `<li><i class="ri-check-line" style="color: #00E5FF; margin-right: 8px;"></i>${f}</li>`).join('')
                    : `<li><i class="ri-check-line" style="color: #00E5FF; margin-right: 8px;"></i>Premium Features Included</li>`;

                return `
                <div class="dynamic-pkg-card ${pkg.isPopular ? 'popular' : ''}">
                    ${pkg.isPopular ? '<div class="popular-badge">Most Popular</div>' : ''}
                    <div class="pkg-header">
                        <h4>${pkg.title}</h4>
                        <p class="service-name">${pkg.serviceId?.title || 'Premium Service'}</p>
                    </div>
                    
                    <div class="pkg-price-box">
                        <span class="symbol">${symbol}</span>
                        <span class="amount">${priceValue.toLocaleString()}</span>
                    </div>

                    <div class="pkg-description">
                        ${pkg.description || 'Elevate your brand with this professional package.'}
                    </div>

                    <ul class="pkg-features">
                        ${featuresHtml}
                    </ul>

                    <a href="/package-detail.html?packageId=${pkg._id}" class="btn-pkg ${pkg.isPopular ? 'filled' : 'outline'}">
                        View Details & Buy
                    </a>
                </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        function showError(msg) {
            const container = document.getElementById('packages-container');
            if (container) {
                container.innerHTML = `<div style="grid-column: 1/-1; color: red; text-align: center; padding: 40px;">${msg}</div>`;
            }
        }
    </script>
