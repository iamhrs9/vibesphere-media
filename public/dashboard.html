<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | VibeSphere</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        /* --- GLOBAL RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #f8f9fc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- 1. PROFESSIONAL HEADER --- */
        nav {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-img {
            height: 40px;
            width: auto;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
        }

        .logo-text span {
            color: #6c63ff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #334155;
        }

        .user-badge i {
            color: #6c63ff;
            font-size: 1.1rem;
        }

        .btn-home {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .btn-home:hover {
            color: #6c63ff;
        }

        .btn-logout {
            background: #fee2e2;
            color: #ef4444;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-logout:hover {
            background: #fecaca;
            transform: translateY(-2px);
        }

        /* --- 2. MAIN CONTENT --- */
        .container {
            flex: 1;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            width: 100%;
        }

        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 {
            font-size: 1.8rem;
            color: #1e293b;
        }

        .page-header p {
            color: #64748b;
            font-size: 1rem;
        }

        .btn-new-order {
            background: #6c63ff;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-new-order:hover {
            background: #5a52d5;
        }

        /* --- ORDER CARDS --- */
        .order-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-color: #6c63ff;
        }

        .order-info h4 {
            margin-bottom: 5px;
            font-size: 1.2rem;
            color: #1e293b;
        }

        .order-info p {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 2px;
        }

        .status {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status.Pending {
            background: #fff7ed;
            color: #c2410c;
        }

        .status.Processing {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .status.Done {
            background: #f0fdf4;
            color: #15803d;
        }

        .price-tag {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            margin-top: 5px;
        }

        .support-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #6c63ff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .support-btn:hover {
            color: #5a52d5;
            text-decoration: underline;
        }

        /* --- DASHBOARD ACTION BUTTONS --- */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-doc {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .btn-invoice {
            background: #f8fafc;
            color: #475569;
            border-color: #e2e8f0;
        }

        .btn-invoice:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-cert {
            background: #ecfdf5;
            color: #059669;
            border-color: #a7f3d0;
        }

        .btn-cert:hover {
            background: #d1fae5;
            color: #047857;
        }

        .btn-cert i {
            font-size: 1rem;
        }

        /* --- 3. AESTHETIC FOOTER --- */
        footer {
            background: white;
            border-top: 1px solid #eaeaea;
            padding: 30px 5%;
            text-align: center;
            margin-top: auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: #6c63ff;
        }

        .copyright {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        /* =========================================
           📱 MOBILE RESPONSIVE MAGIC
           ========================================= */
        @media (max-width: 768px) {

            /* Navbar Compact */
            nav {
                padding: 15px;
            }

            .logo-text {
                display: none;
            }

            /* Text hide karo, sirf Logo dikhao */
            .btn-home {
                display: none;
            }

            /* Home link hide karo */

            .nav-right {
                gap: 10px;
            }

            /* User Badge Small */
            .user-badge {
                padding: 8px;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                justify-content: center;
            }

            .user-badge span {
                display: none;
            }

            /* Naam chupao */
            .user-badge i {
                font-size: 1.2rem;
                margin: 0;
            }

            /* Logout Button Icon Only */
            .btn-logout {
                padding: 10px;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                justify-content: center;
            }

            .btn-logout span {
                display: none;
            }

            /* Text chupao */
            .btn-logout i {
                font-size: 1.2rem;
                margin: 0;
            }

            /* Page Header Stack */
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .btn-new-order {
                width: 100%;
                text-align: center;
                display: block;
            }

            /* Card Stack */
            .order-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 20px;
            }

            /* Right Side (Price & Status) ko Left align aur Row mein lao */
            .order-card>div:last-child {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-top: 1px solid #f0f0f0;
                padding-top: 15px;
            }

            .price-tag {
                margin-top: 0;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="logo-area">
            <img src="logo.webp" alt="Logo" class="logo-img">

        </a>

        <div class="nav-right">

            <div class="user-badge" title="User Profile">
                <i class="ri-user-smile-line"></i>
                <span id="userName">User</span>
            </div>
            <a href="#" onclick="showChangePassword()" class="btn-logout" title="Change Password"
                style="background: #f1f5f9; color: #334155; margin-right: 10px;">
                <i class="ri-lock-password-line"></i> <span>Password</span>
            </a>
            <a href="#" onclick="logout()" class="btn-logout" title="Logout">
                <i class="ri-logout-box-r-line"></i> <span>Logout</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h2>My Orders 📦</h2>
                <p>Track your growth journey here.</p>
            </div>
            <a href="/packages" class="btn-new-order">+ New Order</a>
        </div>

        <div id="ordersList">
            <div style="text-align: center; padding: 50px; color: #94a3b8;">
                <i class="ri-loader-4-line ri-spin" style="font-size: 2rem;"></i>
                <p style="margin-top: 10px;">Loading your orders...</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="/contact">Support</a>
            <a href="/terms&conditions">Terms</a>
            <a href="/refundpolicy">Refunds</a>
        </div>
        <div class="copyright">
            &copy; 2026 VibeSphere Media. Secure Dashboard.
        </div>
    </footer>

    <!-- CHANGE PASSWORD MODAL -->
    <div id="changePasswordModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div
            style="background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="color:#1e293b; font-size:1.3rem;">Change Password</h3>
                <i class="ri-close-line" onclick="closeChangePassword()"
                    style="font-size:1.5rem; cursor:pointer; color:#64748b;"></i>
            </div>

            <div style="margin-bottom:15px;">
                <label style="display:block; font-size:0.9rem; color:#475569; margin-bottom:5px;">Current
                    Password</label>
                <input type="password" id="cpCurrent"
                    style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;"
                    placeholder="Enter current password">
            </div>

            <div style="margin-bottom:15px;">
                <label style="display:block; font-size:0.9rem; color:#475569; margin-bottom:5px;">New Password</label>
                <input type="password" id="cpNew"
                    style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;"
                    placeholder="Create new password">
            </div>

            <button onclick="changePassword()" id="btnChangePass"
                style="width:100%; padding:12px; background:#6c63ff; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; margin-top:10px;">Update
                Password</button>
        </div>
    </div>
<script>
    // DASHBOARD BOUNCER: Agar token nahi hai, toh bhaga do!
    const token = localStorage.getItem('clientToken');
    if (!token) {
        // Token nahi mila? Login page par vapas bhejo
        window.location.href = '/login.html';
    }
</script>
    <script>
        
        // Check Auth
        const user = JSON.parse(localStorage.getItem('clientUser'));
        if (!user) window.location.href = '/login.html';

        document.getElementById('userName').innerText = user.name;

        // Fetch Orders Logic (Updated)
        fetch('/api/client/my-orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: user.email })
        })
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('ordersList');
                list.innerHTML = '';

                if (data.orders.length === 0) {
                    list.innerHTML = `
                    <div style="text-align:center; padding: 40px; background:white; border-radius:16px; border:1px dashed #cbd5e1;">
                        <i class="ri-shopping-bag-3-line" style="font-size: 3rem; color: #cbd5e1;"></i>
                        <h3 style="color:#64748b; margin-top:10px;">No orders yet</h3>
                        <p style="color:#94a3b8; margin-bottom:20px;">Start growing your brand today!</p>
                        <a href="/packages" style="color:#6c63ff; font-weight:600; text-decoration:none;">Browse Packages &rarr;</a>
                    </div>
                `;
                    return;
                }

                data.orders.forEach(order => {
                    const waMessage = encodeURIComponent(`Hi, I need help with Order ID: ${order.orderId}`);

                    // 🚨 MAGIC FIX: Order ID ko URL ke liye safe banaya ( # hata kar %23 kar dega )
                    const safeOrderId = encodeURIComponent(order.orderId);

                    // 🟢 Smart Logic: Certificate button sirf tab dikhega jab status 'Done' ho
                    let certButton = '';
                    if (order.status === 'Done') {
                        certButton = `
                    <a href="/api/download-handover/${safeOrderId}" target="_blank" class="btn-doc btn-cert" title="Download Official Handover">
                        <i class="ri-award-fill"></i> Certificate
                    </a>`;
                    }

                    list.innerHTML += `
                    <div class="order-card">
                        <div class="order-info">
                            <h4>${order.package}</h4>
                            <p><i class="ri-hashtag" style="color:#94a3b8;"></i> <strong>Order ID:</strong> ${order.orderId}</p>
                            <p><i class="ri-calendar-line" style="color:#94a3b8;"></i> <strong>Date:</strong> ${order.date}</p>
                            
                            <div class="action-buttons">
                                <a href="https://wa.me/918302485826?text=${waMessage}" target="_blank" class="support-btn" style="margin-top:0;">
                                    <i class="ri-whatsapp-line"></i> Support
                                </a>
                                <a href="/api/download-invoice/${safeOrderId}" target="_blank" class="btn-doc btn-invoice">
                                    <i class="ri-file-list-3-line"></i> Invoice
                                </a>
                                ${certButton}
                            </div>
                        </div>
                        <div>
                            <span class="status ${order.status}">${order.status}</span>
                            <div class="price-tag">${order.price}</div>
                        </div>
                    </div>
                `;
                });
            })
            .catch(err => {
                document.getElementById('ordersList').innerHTML = `<p style="text-align:center; color:red;">Error loading orders.</p>`;
            });

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('clientUser');
                window.location.href = '/login.html';
            }
        }

        // --- PASSWORD CHANGE LOGIC ---
        function showChangePassword() {
            document.getElementById('changePasswordModal').style.display = 'flex';
        }

        function closeChangePassword() {
            document.getElementById('changePasswordModal').style.display = 'none';
            document.getElementById('cpCurrent').value = '';
            document.getElementById('cpNew').value = '';
        }

        async function changePassword() {
            const currentPassword = document.getElementById('cpCurrent').value;
            const newPassword = document.getElementById('cpNew').value;
            const btn = document.getElementById('btnChangePass');

            if (!currentPassword || !newPassword) return alert("Please fill all fields");

            btn.innerText = "Updating...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: user.email,
                        currentPassword,
                        newPassword
                    })
                });

                const data = await res.json();
                alert(data.message);

                if (data.success) {
                    closeChangePassword();
                }
            } catch (error) {
                alert("Error changing password. Please try again.");
            }

            btn.innerText = "Update Password";
            btn.disabled = false;
        }
    </script>
</body>

</html>
