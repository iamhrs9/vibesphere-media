<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Careers at VibeSphere Media | Join Our Digital Marketing Team</title>
    <meta name="description"
        content="Explore career opportunities at VibeSphere Media — a fast-growing Digital Marketing Agency in Jaipur, India. We're looking for passionate marketers, developers, designers, and video editors.">
    <meta name="keywords"
        content="VibeSphere Media Careers, Digital Marketing Jobs India, Social Media Manager Job Jaipur, Web Developer Job India, Content Writer Job, Video Editor Job, Marketing Agency Hiring">
    <meta name="author" content="VibeSphere Media">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://vibespheremedia.in/careers" />
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Join VibeSphere Media — We're Hiring!">
    <meta property="og:description"
        content="Explore exciting career opportunities at VibeSphere Media. Work with a passionate team and build the future of digital marketing.">
    <meta property="og:url" content="https://vibespheremedia.in/careers">
    <meta property="og:image" content="https://vibespheremedia.in/logo.webp">
    <meta property="og:site_name" content="VibeSphere Media">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Careers at VibeSphere Media">
    <meta name="twitter:description"
        content="Join a fast-growing digital agency. Open positions in marketing, dev, design and more.">
    <meta name="twitter:image" content="https://vibespheremedia.in/logo.webp">

    <!-- JSON-LD: JobPosting Aggregate -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Careers at VibeSphere Media",
      "description": "Explore open job positions at VibeSphere Media Digital Marketing Agency in Jaipur, India.",
      "url": "https://vibespheremedia.in/careers",
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://vibespheremedia.in" },
          { "@type": "ListItem", "position": 2, "name": "Careers", "item": "https://vibespheremedia.in/careers" }
        ]
      }
    }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
        }

        /* --- NAVBAR --- */
        header {
            background: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #111;
            text-decoration: none;
        }

        .logo span {
            color: #6c63ff;
        }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #6c63ff;
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, #f0f3ff 0%, #ffffff 100%);
        }

        .hero h1 {
            font-size: 48px;
            color: #111;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* --- JOBS SECTION (UPDATED FOR ACCORDION) --- */
        .jobs-container {
            max-width: 900px;
            margin: -40px auto 100px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .job-card {
            background: white;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            transition: 0.3s;
            border-left: 5px solid transparent;
            cursor: pointer;
            overflow: hidden;
        }

        .job-card:hover {
            border-left-color: #6c63ff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        /* Summary (Always Visible) */
        .job-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-header-left h2 {
            font-size: 22px;
            color: #111;
            margin-bottom: 5px;
        }

        .short-info {
            font-size: 14px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dropdown-icon {
            font-size: 24px;
            color: #111;
            transition: transform 0.4s ease;
            background: #f0f3ff;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Details (Hidden by Default) */
        .job-details {
            max-height: 0;
            opacity: 0;
            transition: all 0.4s ease-in-out;
        }

        .job-details-inner {
            padding-top: 25px;
            margin-top: 20px;
            border-top: 1px solid #eee;
        }

        /* Active State Classes */
        .job-card.active .job-details {
            max-height: 500px;
            opacity: 1;
        }

        .job-card.active .dropdown-icon {
            transform: rotate(180deg);
            background: #6c63ff;
            color: white;
        }

        .job-tags {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .tag {
            background: #f0f3ff;
            color: #6c63ff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tag.location {
            background: #fef2f2;
            color: #dc2626;
        }

        .job-desc {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-apply {
            background: #111;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-apply:hover {
            background: #6c63ff;
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        .no-jobs {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .no-jobs i {
            font-size: 50px;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        /* --- FOOTER --- */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            .nav-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }

            .nav-links a {
                margin: 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="logo">VibeSphere<span>.</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <section class="hero">
        <h1>Shape the Future with Us</h1>
        <p>Join VibeSphere Media and work with a passionate team dedicated to creating next-level digital experiences
            and marketing campaigns.</p>
    </section>

    <div class="jobs-container" id="jobsList">
        <div style="text-align: center; padding: 50px; color: #666;">
            <i class="ri-loader-4-line" style="font-size: 30px; animation: spin 1s linear infinite;"></i>
            <p style="margin-top: 10px;">Loading open positions...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 VibeSphere Media. All rights reserved.</p>
    </footer>

    <script>
        const HR_WHATSAPP = "918302485826";

        // Toggle Expand/Collapse Function
        function toggleJob(cardElement) {
            // Agar pehle se koi aur card khula hai, toh usko band kar do (Optional)
            const allCards = document.querySelectorAll('.job-card');
            allCards.forEach(card => {
                if (card !== cardElement) card.classList.remove('active');
            });

            // Jis card pe click kiya hai usko toggle karo
            cardElement.classList.toggle('active');
        }

        async function fetchPublicJobs() {
            try {
                const response = await fetch('/api/jobs');
                const data = await response.json();
                const container = document.getElementById('jobsList');

                container.innerHTML = '';

                if (data.success && data.jobs.length > 0) {
                    data.jobs.forEach(job => {
                        const whatsappMessage = encodeURIComponent(`Hi VibeSphere Team, \n\nI am interested in applying for the *${job.title}* position.\n\nHere is my resume/portfolio: `);

                        container.innerHTML += `
                            <div class="job-card" onclick="toggleJob(this)">
                                <div class="job-summary">
                                    <div class="job-header-left">
                                        <h2>${job.title}</h2>
                                        <span class="short-info"><i class="ri-map-pin-line"></i> ${job.location} • Click to view details</span>
                                    </div>
                                    <div class="dropdown-icon">
                                        <i class="ri-arrow-down-s-line"></i>
                                    </div>
                                </div>
                                
                                <div class="job-details">
                                    <div class="job-details-inner">
                                        <div class="job-tags">
                                            <span class="tag"><i class="ri-briefcase-line"></i> ${job.type}</span>
                                            <span class="tag location"><i class="ri-map-pin-line"></i> ${job.location}</span>
                                        </div>
                                        <p class="job-desc">${job.description}</p>
                                        
                                        <a href="https://wa.me/${HR_WHATSAPP}?text=${whatsappMessage}" target="_blank" class="btn-apply" onclick="event.stopPropagation();">
                                            Apply Now <i class="ri-arrow-right-line"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `
                        <div class="no-jobs">
                            <i class="ri-ghost-line"></i>
                            <h3>No Open Positions</h3>
                            <p style="color: #666; margin-top: 10px;">We are currently not hiring for any roles, but we are always looking for great talent. Keep an eye out for future opportunities.</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('jobsList').innerHTML = `<p style="text-align:center; color:red;">Failed to load jobs. Please check your internet connection.</p>`;
            }
        }

        fetchPublicJobs();
    </script>
</body>

</html>
