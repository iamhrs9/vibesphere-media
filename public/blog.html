    <style>
        /* --- 🚨 GLOBAL RESET & SCROLL FIX --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; max-width: 100vw; overflow-x: hidden !important;
            margin: 0; padding: 0; background-color: #ffffff !important;
            color: #1e293b !important; font-family: 'Outfit', sans-serif;
        }

        /* --- NAVBAR --- */
        header {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; width: 100%;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- HERO SECTION --- */
        .hero-section {
            text-align: center; padding: 80px 20px 60px; background-color: #ffffff;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px;
            position: relative; overflow: hidden; width: 100%;
        }
        .hero-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; background: linear-gradient(180deg, rgba(139, 92, 246, 0.15) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50%; filter: blur(60px); z-index: 0;
        }
        .hero-content { position: relative; z-index: 1; width: 100%; }
        .hero-badge {
            display: inline-block; background: rgba(139, 92, 246, 0.1); color: #8b5cf6;
            padding: 6px 16px; border-radius: 50px; font-size: 0.85rem; font-weight: 600;
            margin-bottom: 20px; border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .hero-title { font-size: 3.5rem; font-weight: 700; margin: 0; color: #1e293b; letter-spacing: -1px; line-height: 1.1; }
        .hero-subtitle { color: #64748b; font-size: 1.2rem; margin-top: 15px; max-width: 600px; margin-left: auto; margin-right: auto; }
/* --- SEARCH & FILTERS --- */
        .filter-section {
            max-width: 1200px; margin: 40px auto 0; padding: 0 20px;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        
        .search-box {
            width: 100%; max-width: 500px; position: relative;
        }
        
        .search-box input {
            width: 100%; padding: 15px 20px 15px 45px; border-radius: 50px;
            border: 1px solid #e2e8f0; font-size: 1rem; outline: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.3s;
        }
        
        .search-box input:focus { border-color: #8b5cf6; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2); }
        
        .search-box i {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 1.2rem;
        }

        .category-filters {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        }

        .cat-btn {
            background: #f1f5f9; color: #475569; border: none; padding: 8px 18px;
            border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s;
            font-size: 0.9rem;
        }

        .cat-btn:hover { background: #e2e8f0; }
        .cat-btn.active { background: #8b5cf6; color: white; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); }
        /* --- BLOG GRID --- */
        .blog-container {
            max-width: 1200px; margin: 0 auto 100px; padding: 40px 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; width: 100%;
        }

        /* --- CARD DESIGN --- */
        .blog-card {
            background: #fff; border: 1px solid #f1f5f9; border-radius: 20px; overflow: hidden;
            transition: 0.4s ease; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }
        .blog-card:hover {
            transform: translateY(-8px); box-shadow: 0 20px 40px -10px rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.3);
        }
        .img-wrapper { height: 240px; overflow: hidden; position: relative; }
        .blog-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .blog-card:hover .blog-img { transform: scale(1.08); }

        .card-content { padding: 30px; }
        .card-meta {
            font-size: 0.85rem; color: #8b5cf6; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: block;
        }
        .card-title { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin: 0 0 15px 0; line-height: 1.3; }
        .read-btn {
            display: inline-flex; align-items: center; gap: 8px; color: #1e293b;
            font-weight: 600; text-decoration: none; margin-top: 10px; transition: 0.3s;
        }
        .read-btn i { color: #8b5cf6; transition: 0.3s; }
        .read-btn:hover { gap: 12px; color: #8b5cf6; }

        /* --- EMPTY STATE --- */
        .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; color: #64748b; }
        .empty-icon { font-size: 3rem; color: #cbd5e1; margin-bottom: 15px; display: block; }

        /* --- 📱 MOBILE RESPONSIVE FIXES --- */
        @media screen and (max-width: 768px) {
            .blog-container { grid-template-columns: 1fr !important; padding: 30px 15px !important; gap: 25px !important; }
            .nav-container { padding: 12px 15px !important; }
            .nav-link-text { font-size: 0.85rem !important; }
            .hide-on-mobile { display: none !important; }
            .hero-title { font-size: 2.2rem !important; }
            .hero-subtitle { font-size: 1rem !important; }
            .logo-text { font-size: 1.3rem !important; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
        <a href="/" class="logo-link">
            <img src="logo.webp" alt="VibeSphere Media Logo" class="logo-img">
        </a>
        
        <ul class="nav-links" id="nav-menu">
            <li><a href="/#home">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/#services">Services</a></li>
            <li><a href="/packages">Packages</a></li>
            <li><a href="/contact">Contact</a></li>
            <li>
                    <a href="/blog" style="position: relative; display: inline-flex; align-items: center; gap: 5px;">
                        Blog 
                        <span style="font-size: 0.7rem; background: #a855f7; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold;">NEW</span>
                    </a>
                </li>
                <li>
                    <a href="/login" style="position: relative; display: inline-flex; align-items: center; gap: 5px;">
                        Login 
                       
                    </a>
                </li>
        </ul>

        <div class="nav-right">
            <a href="/login" class="btn-primary">Login</a>
            <div class="menu-icon" id="hamburger-btn">
                <i class="ri-menu-3-line"></i>
            </div>
        </div>
    </nav>
    </header>

    <div class="hero-section">
        <div class="hero-glow"></div>
        <div class="hero-content">
            <span class="hero-badge">🚀 Growth & Tech</span>
            <h1 class="hero-title">Latest Insights</h1>
            <p class="hero-subtitle">Discover strategies to scale your brand, master tech, and dominate social media in 2026.</p>
        </div>
    </div>
    <div class="filter-section">
        <div class="search-box">
            <i class="ri-search-line"></i>
            <input type="text" id="searchInput" placeholder="Search for articles, tips, or guides..." onkeyup="filterBlogs()">
        </div>
        <div class="category-filters" id="categoryBox">
            <button class="cat-btn active" onclick="setCategory('All', this)">All Insights</button>
            <button class="cat-btn" onclick="setCategory('Digital Marketing', this)">Digital Marketing</button>
            <button class="cat-btn" onclick="setCategory('Web Development', this)">Web Development</button>
            <button class="cat-btn" onclick="setCategory('Instagram Growth', this)">Instagram Growth</button>
            <button class="cat-btn" onclick="setCategory('Business Tips', this)">Business</button>
        </div>
    </div>
    <div class="blog-container" id="blogList">
        <div class="empty-state">
            <i class="ri-loader-4-line empty-icon ri-spin"></i>
            <p>Fetching latest articles...</p>
        </div>
    </div>

    <footer style="background: #1e293b; color: white; padding: 40px 0; text-align: center; margin-top: auto;">
        <p style="opacity: 0.7; font-size: 0.9rem;">&copy; 2026 VibeSphere Media. Built for You.</p>
    </footer>

   <script>let allPublishedBlogs = []; // Global array taaki baar-baar API call na karni pade
        let currentCategory = 'All';

        // Fetch Blogs API
        fetch('/api/blogs')
            .then(res => res.json())
            .then(data => {
                // Sirf 'Published' blogs ko filter karke array mein save karenge (Drafts hata denge)
                allPublishedBlogs = data.filter(blog => blog.status !== 'Draft');
                renderBlogs(allPublishedBlogs); // Pehli baar saare blogs dikhao
            })
            .catch(err => {
                console.error(err);
                document.getElementById('blogList').innerHTML = `<p class="empty-state" style="grid-column: 1/-1;">Failed to load blogs. Please try again later.</p>`;
            });

        // Blogs Render Karne ka Function
        function renderBlogs(blogsToShow) {
            const container = document.getElementById('blogList');
            container.innerHTML = ''; 
            
            if(blogsToShow.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="ri-article-line empty-icon"></i>
                        <h3>No articles found!</h3>
                        <p>Try searching for a different keyword or category.</p>
                    </div>
                `;
                return;
            }

            blogsToShow.forEach(blog => {
                let dateStr = "Recent";
                try {
                    dateStr = new Date(blog.date).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                } catch(e) {}

                const displayTitle = blog.title || blog.titleHinglish || blog.titleHindi || "Untitled Post";
                // Category badge dikhane ke liye
                const catBadge = blog.category ? `<span style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-left: 10px; text-transform: uppercase;">${blog.category}</span>` : '';

                const html = `
                    <article class="blog-card">
                        <div class="img-wrapper">
                            <img src="${blog.image}" class="blog-img" alt="Blog Thumb" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                        </div>
                        <div class="card-content">
                            <div style="display: flex; align-items: center; margin-bottom: 10px;">
                                <span class="card-meta" style="margin-bottom: 0;">${dateStr}</span>
                                ${catBadge}
                            </div>
                            <h3 class="card-title">${displayTitle}</h3>
                            <a href="/blog/${blog.slug}" class="read-btn">
                                Read Article <i class="ri-arrow-right-line"></i>
                            </a>
                        </div>
                    </article>
                `;
                container.innerHTML += html;
            });
        }

        // Category Select Handle Karne ka logic
        window.setCategory = function(catName, btnElement) {
            currentCategory = catName;
            
            // UI Update: Active class lagana aur hatana
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            // Search field clear kar do category change hone par (optional, par achha UX hai)
            document.getElementById('searchInput').value = '';
            
            filterBlogs();
        }

        // Live Search + Category Filter Combine Logic
        window.filterBlogs = function() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            const filteredData = allPublishedBlogs.filter(blog => {
                // Title, Tags, ya Content me search match kare
                const titleMatch = (blog.title || '').toLowerCase().includes(searchTerm);
                const tagsMatch = (blog.tags || '').toLowerCase().includes(searchTerm);
                
                // Category match kare
                const categoryMatch = currentCategory === 'All' || blog.category === currentCategory;
                
                return (titleMatch || tagsMatch) && categoryMatch;
            });

            renderBlogs(filteredData);
        }</script>
</body>
